      brasileirao_serie_a: https://ge.globo.com/futebol/brasileirao-serie-a/
      brasileirao_serie_b: https://ge.globo.com/futebol/brasileirao-serie-b/
    allowed_uses:
      - catalogo
      - times
      - noticias_ui
      - radar
    prohibited_uses:
      - odds
      - escalacao
      - lesao
      - xg
      - banca
    notes:
      - "Classificacao/forma/escudos entram em teams.caracteristicas com _fontes.ge_globo."
