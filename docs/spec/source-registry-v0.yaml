    reliability: 4
    cost: gratis
    license_use: revisar_tos
    automation: http_fetch_plus_scraper_html
    snapshot_required: true
    provenance_required: true
    recommended_frequency: por_rodada
    parser:
      module: engine.ingestion.cbf_tabelas
      outputs:
        - manual_source_batch_v0
      supported_data:
        - classificacao
        - disciplina_agregada
        - jogos
        - resultados
    endpoints:
      brasileirao_serie_a_2026: https://www.cbf.com.br/futebol-brasileiro/tabelas/campeonato-brasileiro/serie-a/2026
      brasileirao_serie_b_2026: https://www.cbf.com.br/futebol-brasileiro/tabelas/campeonato-brasileiro/serie-b/2026
    allowed_uses:
      - catalogo
      - times
      - radar
      - backtest
    prohibited_uses:
      - odds
      - escalacao
      - lesao
      - xg
    notes:
      - "Parser v0 extrai classificacao, CA/CV agregado e jogos/resultados do HTML salvo ou baixado."
      - "Upsert no banco e alimentacao do radar ainda dependem de contrato e aprovacao."

