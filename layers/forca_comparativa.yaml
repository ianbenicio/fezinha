# Camada: Força Comparativa / Rating Transitivo (NOVA)
# Referência: docs/spec/secao-36-propriedades-camadas.md
# Responde "A venceu B, B venceu C → o que esperar de A x D?" usando o grafo
# COMPLETO de resultados (Colley + Massey). Nao consome contexto de outras
# camadas; ajustes contextuais pertencem ao agregador.
# Saída: IFC 0-100 por time (50 = média da liga). Fácil pro usuário comum.

id: forca_comparativa
nucleo: estatistico
motor: formula
versao: "1.0"

pergunta_unica: "Pela cadeia transitiva de resultados, quem é mais forte — e quanto?"

prioridades:
  - ifc_0_100               # nota única interpretável (50 = média)
  - expectativa_confronto   # diferença IFC → prob via logística (família Elo)
  - adversarios_comuns      # a cadeia A→B→C→D explicada com jogos reais
  - mando_de_campo          # ajuste interno fixo para expectativa do mandante

# ── FÓRMULA ─────────────────────────────────────────────
formula:
  colley: "(2+n_i)·c_i + Σ_j c_j = 1 + (v_i - d_i)/2 ; sistema NxN, empate = meia vitória"
  massey: "M·r = saldo_de_gols ; última linha Σr=0 (regularização)"
  ifc: "100 · (0.6·colley + 0.4·sigmoide(massey/2))"
  expectativa: "P(A vence ajustado) = 1 / (1 + 10^(-(IFC_A - IFC_B + mando)/40))"
  mando_bonus: 7            # pontos IFC equivalentes ao fator casa (calibrável)

escopo:
  - rating_transitivo_liga
  - comparativo_par_a_par
  - adversarios_comuns
  - mando_de_campo

fora_de_escopo:
  - coleta_de_desfalques     # -> elenco_impacto
  - coleta_de_estilo         # -> tatica_matchup
  - coleta_de_cartoes        # -> arbitragem/elenco
  - consumo_de_sinais_contextuais # -> agregador
  - distribuicao_de_placar   # → dixon_coles (IFC não substitui a matriz)

inputs_permitidos:
  - resultados_encerrados_da_liga   # o grafo (matches com placar)
  - mando_de_campo
inputs_proibidos:
  - odds
  - output_outras_camadas
  - probabilidade_outras_camadas
fonte_minima: 1
janela_temporal: "temporada_atual"

output_schema:
  mandante: { ifc: 0, colley: 0.0, massey: 0.0, leitura: [elite, forte, media, fraca, critica] }
  visitante: { ifc: 0, colley: 0.0, massey: 0.0, leitura: [elite, forte, media, fraca, critica] }
  comparativo:
    diferenca_ifc: 0
    expectativa_mandante: 0.0       # com bônus de mando
    leitura: [vantagem_forte_casa, vantagem_casa, equilibrio, vantagem_fora, vantagem_forte_fora]
  adversarios_comuns:               # a cadeia explicada
    - adversario: ""
      resultado_mandante: ""        # ex: "venceu 2x0 (casa)"
      resultado_visitante: ""       # ex: "perdeu 0x1 (fora)"
  ajustes_aplicados: [string]       # mando aplicado pelo proprio modulo

campo_leitura:
  ativo: false                      # fórmula determinística

output_proibido:
  - prob_final_calibrada            # expectativa é da camada; calibração é do agregador
  - recoleta_de_contexto
max_output_tokens: 0

exige_evidencia: true               # todo IFC rastreia os jogos do grafo
sem_evidencia: nao_aplicavel
proibe_especulacao: true
granularidade: especifica

peso_inicial: medio                 # stacking decide vs pi_ratings (sobreposição parcial)
podavel: true                       # se redundante com pi_ratings, o backtest poda
qualidade_min: 3                    # < 5 rodadas de liga → qualidade baixa
modelo_llm: null
